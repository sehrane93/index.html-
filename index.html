<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Profit $750</title>
    <style>
        /* خلفية شارت تداول احترافية مع تعتيم ذكي */
        body { 
            background: #000 url('https://w0.peakpx.com/wallpaper/559/541/HD-wallpaper-stock-market-candlestick-chart-trading-chart-stock-market-data-financial-charts-stock-market-concepts.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; font-family: 'system-ui', -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.88); z-index: 1;
        }

        /* حاوية مرنة تمنع التداخل نهائياً */
        .card { 
            position: relative; z-index: 2; width: 85%; max-width: 340px; 
            border: 2px solid #00d632; border-radius: 25px; 
            padding: 25px 20px; background: rgba(10, 10, 10, 0.98); 
            box-shadow: 0 0 35px rgba(0, 214, 50, 0.4); 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        h1 { color: #00d632; font-size: 55px; margin: 0; text-shadow: 0 0 15px rgba(0,214,50,0.5); font-weight: 900; }
        .reward-text { font-size: 14px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }

        /* منطقة آمنة لحركة الأموال */
        .money-stage { position: relative; height: 110px; width: 100%; margin: 5px 0; overflow: visible; }
        
        .flying-money {
            font-size: 45px; position: absolute; left: 50%; bottom: 0;
            transform: translateX(-50%);
            animation: explosionUp 2s infinite ease-out;
        }

        @keyframes explosionUp {
            0% { bottom: 0; opacity: 1; transform: translateX(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateX(-80%) scale(1.3) rotate(-20deg); }
            100% { bottom: 140px; opacity: 0; transform: translateX(40%) scale(0.6) rotate(20deg); }
        }

        .status { color: #00d632; font-weight: bold; font-size: 16px; margin: 5px 0; }

        /* زر احترافي لا يغطي المحتوى */
        .cta-btn { 
            width: 100%; background: linear-gradient(135deg, #00d632, #00ff40); 
            color: #000; padding: 18px 0; text-decoration: none; 
            border-radius: 50px; font-weight: 900; font-size: 22px; 
            box-shadow: 0 8px 15px rgba(0, 214, 50, 0.3); transition: 0.2s;
            text-transform: uppercase; text-align: center;
        }

        .cta-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <h1>$750</h1>
        <div class="reward-text">Claim Your Trading Reward</div>
        
        <div class="money-stage">
            <div class="flying-money" style="animation-delay: 0s;">💰</div>
            <div class="flying-money" style="animation-delay: 0.7s;">💵</div>
            <div class="flying-money" style="animation-delay: 1.4s;">💸</div>
        </div>

        <div class="status">STATUS: <span style="text-decoration: underline;">READY</span></div>

        <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="cta-btn">Activate Now</a>
    </div>
</body>
</html>
