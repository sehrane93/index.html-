<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Rewards</title>
    <style>
        /* خلفية شارت تداول متحركة واحترافية */
        body { 
            background: #000 url('https://images.unsplash.com/photo-1611974714024-46279913560e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1;
        }

        .card { 
            position: relative; z-index: 2; width: 85%; max-width: 380px; 
            border: 3px solid #00d632; border-radius: 30px; 
            padding: 40px 20px; background: rgba(5, 5, 5, 0.95); 
            box-shadow: 0 0 50px rgba(0, 214, 50, 0.7); text-align: center;
        }

        h1 { color: #00d632; font-size: 70px; margin: 0; text-shadow: 0 0 20px rgba(0,214,50,0.8); }
        .sub { font-size: 20px; margin-bottom: 25px; color: #fff; }

        /* حل مشكلة الصورة: استخدام رابط مباشر وموثوق جداً لانفجار المال */
        .money-anim { 
            width: 100%; max-width: 280px; border-radius: 20px; 
            margin-bottom: 30px; border: 2px solid #333;
            animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn { 
            display: block; background: linear-gradient(135deg, #00d632, #00ff40); 
            color: #000; padding: 22px; text-decoration: none; 
            border-radius: 100px; font-weight: 900; font-size: 28px; 
            box-shadow: 0 15px 35px rgba(0, 214, 50, 0.5); transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <h1>$750</h1>
        <div class="sub">CLAIM YOUR REWARD</div>
        
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZpZ3F4bnE0Z3F4bnE0Z3F4bnE0Z3F4bnE0Z3F4bnE0Z3F4bnEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PZw/LdOyjZ7fC49R7Xkuzh/giphy.gif" class="money-anim">

        <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="btn">Activate Now</a>
    </div>
</body>
</html>
