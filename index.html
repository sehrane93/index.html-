<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Profit $750</title>
    <style>
        /* إجبار الخلفية على الظهور كشارت تداول */
        body { 
            background: #000 url('https://w0.peakpx.com/wallpaper/559/541/HD-wallpaper-stock-market-candlestick-chart-trading-chart-stock-market-data-financial-charts-stock-market-concepts.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1;
        }

        /* حاوية البطاقة لمنع التداخل نهائياً */
        .card { 
            position: relative; z-index: 2; width: 85%; max-width: 330px; 
            border: 3px solid #00d632; border-radius: 25px; 
            padding: 30px 15px; background: rgba(5, 5, 5, 0.98); 
            box-shadow: 0 0 40px rgba(0, 214, 50, 0.5); 
            display: flex; flex-direction: column; justify-content: space-between;
            height: 440px; text-align: center;
        }

        h1 { color: #00d632; font-size: 60px; margin: 0; font-weight: 900; text-shadow: 0 0 20px rgba(0,214,50,0.5); }
        .label { font-size: 14px; text-transform: uppercase; color: #ccc; letter-spacing: 1px; }

        /* مساحة الأموال المنفجرة */
        .money-zone { position: relative; height: 140px; width: 100%; overflow: visible; }
        
        .cash {
            font-size: 50px; position: absolute; left: 50%; bottom: 0;
            transform: translateX(-50%);
            animation: burstUp 2s infinite ease-out;
        }

        @keyframes burstUp {
            0% { bottom: 0; opacity: 1; transform: translateX(-50%) scale(0.6); }
            50% { opacity: 1; transform: translateX(-80%) scale(1.3) rotate(-15deg); }
            100% { bottom: 180px; opacity: 0; transform: translateX(30%) scale(0.5) rotate(20deg); }
        }

        .status { color: #00d632; font-weight: bold; margin-bottom: 10px; }

        /* زر التفعيل */
        .btn { 
            display: block; width: 100%; background: linear-gradient(135deg, #00d632, #00ff40); 
            color: #000; padding: 18px 0; text-decoration: none; 
            border-radius: 50px; font-weight: 900; font-size: 24px; 
            box-shadow: 0 10px 20px rgba(0, 214, 50, 0.4); text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <div>
            <h1>$750</h1>
            <div class="label">Your Trading Reward</div>
        </div>
        
        <div class="money-zone">
            <div class="cash" style="animation-delay: 0s;">💰</div>
            <div class="cash" style="animation-delay: 0.7s;">💵</div>
            <div class="cash" style="animation-delay: 1.4s;">💸</div>
        </div>

        <div>
            <div class="status">STATUS: READY</div>
            <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="btn">Activate Now</a>
        </div>
    </div>
</body>
</html>
