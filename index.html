<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Profits $750</title>
    <style>
        /* خلفية شارت تداول احترافية */
        body { 
            background: #000 url('https://images.unsplash.com/photo-1611974714024-46279913560e?q=80&w=1000&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; font-family: 'Arial Black', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* طبقة حماية لجعل النصوص واضحة */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.82); z-index: 1;
        }

        .card { 
            position: relative; z-index: 2; width: 88%; max-width: 380px; 
            border: 3px solid #00d632; border-radius: 35px; 
            padding: 45px 20px; background: rgba(5, 5, 5, 0.95); 
            box-shadow: 0 0 50px rgba(0, 214, 50, 0.6); text-align: center;
        }

        h1 { color: #00d632; font-size: 75px; margin: 0; text-shadow: 0 0 20px rgba(0,214,50,0.8); }
        .sub { font-size: 18px; margin-bottom: 25px; color: #fff; letter-spacing: 1px; }

        /* تأثير انفجار الأموال (إيموجي متحرك لضمان عدم الحظر) */
        .money-burst { 
            font-size: 100px; margin: 20px 0; display: block;
            animation: burst 1s infinite alternate;
        }

        @keyframes burst {
            0% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 5px gold); }
            100% { transform: scale(1.3) rotate(10deg); filter: drop-shadow(0 0 25px #00d632); }
        }

        .btn { 
            display: block; background: linear-gradient(135deg, #00d632, #00ff40); 
            color: #000; padding: 22px; text-decoration: none; 
            border-radius: 100px; font-weight: 900; font-size: 28px; 
            box-shadow: 0 15px 35px rgba(0, 214, 50, 0.5); transition: 0.3s;
            text-transform: uppercase; margin-top: 10px;
        }

        .btn:active { transform: scale(0.92); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <h1>$750</h1>
        <div class="sub">CLAIM YOUR TRADING REWARD</div>
        
        <div class="money-burst">💰</div>

        <div style="color:#00d632; font-weight:bold; margin-bottom:20px; border:1px solid #00d632; display:inline-block; padding:5px 15px; border-radius:10px;">
            STATUS: READY
        </div>

        <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="btn">ACTIVATE NOW</a>
    </div>
</body>
</html>
