<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Reward $750</title>
    <style>
        /* خلفية شارت تداول متحركة وجذابة */
        body { 
            background: #000 url('https://w0.peakpx.com/wallpaper/559/541/HD-wallpaper-stock-market-candlestick-chart-trading-chart-stock-market-data-financial-charts-stock-market-concepts.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        /* طبقة تظليل لجعل المحتوى بارزاً */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1;
        }

        .main-card { 
            position: relative;
            z-index: 2;
            width: 85%; 
            max-width: 380px; 
            border: 3px solid #00d632; 
            border-radius: 25px; 
            padding: 35px 20px; 
            background: rgba(10, 10, 10, 0.95); 
            box-shadow: 0 0 40px rgba(0, 214, 50, 0.6);
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: #00d632; font-size: 65px; margin: 0; font-weight: 900; text-shadow: 0 0 15px rgba(0,214,50,0.5); }
        .sub-text { font-size: 18px; color: #ccc; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .status-badge { 
            display: inline-block; 
            border: 2px solid #00d632; 
            color: #00d632; 
            padding: 5px 20px; 
            border-radius: 50px; 
            font-weight: bold; 
            margin-bottom: 25px;
            background: rgba(0, 214, 50, 0.1);
        }

        /* صورة انفجار الأموال المتحركة */
        .money-gif { 
            width: 100%; 
            max-width: 280px; 
            border-radius: 15px; 
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .cta-button { 
            display: block; 
            background: linear-gradient(90deg, #00d632, #00ff40); 
            color: #000; 
            padding: 22px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 900; 
            font-size: 26px; 
            box-shadow: 0 10px 30px rgba(0, 214, 50, 0.4);
            transition: 0.3s all;
            text-transform: uppercase;
        }

        .cta-button:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(0, 214, 50, 0.2); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="main-card">
        <h1>$750</h1>
        <div class="sub-text">Claim Your Reward</div>
        
        <div class="status-badge">STATUS: READY</div>
        
        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZpZ3F4bnE0Z3F4bnE0Z3F4bnE0Z3F4bnE0Z3F4bnE0Z3F4bnEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PZw/LdOyjZ7fC49R7Xkuzh/giphy.gif" class="money-gif" alt="Cash Explosion">

        <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="cta-button">Activate Now</a>
    </div>
</body>
</html>
