<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Reward $750</title>
    <style>
        /* شارت تداول برمجي ثابت لا يعتمد على صور */
        body { 
            background: #050505;
            background-image: 
                linear-gradient(rgba(0, 214, 50, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 214, 50, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: 'Arial Black', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .card { 
            position: relative; z-index: 10; width: 90%; max-width: 360px; 
            border: 4px solid #00d632; border-radius: 30px; 
            padding: 30px 15px; background: #0a0a0a; 
            box-shadow: 0 0 40px rgba(0, 214, 50, 0.6); text-align: center;
        }

        h1 { color: #00d632; font-size: 60px; margin: 0; text-shadow: 0 0 15px rgba(0,214,50,0.5); }
        p { margin: 10px 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }

        /* منطقة الأموال المنفجرة */
        .money-flow { position: relative; height: 120px; margin: 15px 0; }
        
        .bill {
            font-size: 50px; position: absolute; left: 50%; bottom: 0;
            transform: translateX(-50%);
            animation: flyUp 1.5s infinite ease-out;
        }

        @keyframes flyUp {
            0% { bottom: 0; opacity: 1; transform: translateX(-50%) scale(0.6); }
            50% { opacity: 1; transform: translateX(-80%) scale(1.2) rotate(-15deg); }
            100% { bottom: 180px; opacity: 0; transform: translateX(40%) scale(0.5) rotate(20deg); }
        }

        .cta-btn { 
            display: block; background: #00d632; color: #000; 
            padding: 18px; text-decoration: none; border-radius: 50px; 
            font-weight: 900; font-size: 24px; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,214,50,0.4); margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>$750
