<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Profit</title>
    <style>
        /* خلفية نيون مبرمجة داخلياً لضمان الظهور */
        body { 
            background: #000; 
            background-image: radial-gradient(circle at center, #001a05 0%, #000 70%);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: 'Arial Black', sans-serif; overflow: hidden;
        }

        /* حاوية صلبة تمنع تداخل العناصر نهائياً */
        .container {
            width: 85%; max-width: 320px; height: 500px;
            border: 5px solid #00d632; border-radius: 40px;
            background: rgba(0,0,0,0.9); padding: 20px;
            display: grid; /* استخدام نظام الشبكة لضمان ثبات كل عنصر في مكانه */
            grid-template-rows: 1fr 1fr 1fr; /* تقسيم البطاقة لـ 3 أجزاء متساوية */
            text-align: center; box-shadow: 0 0 50px #00d63266;
        }

        /* الجزء العلوي: المبلغ */
        .top-part h1 { color: #00d632; font-size: 60px; margin: 0; text-shadow: 0 0 15px #00d632; }
        .top-part p { color: #fff; font-size: 12px; letter-spacing: 2px; margin: 0; }

        /* الجزء الأوسط: الرسوم المتحركة (معزولة تماماً) */
        .mid-part { position: relative; overflow: visible; display: flex; justify-content: center; align-items: center; }
        .emoji { font-size: 60px; position: absolute; animation: fly 2s infinite ease-in-out; }
        
        @keyframes fly {
            0% { transform: translateY(50px) scale(0.5); opacity: 0; }
            50% { opacity: 1; transform: translateY(0px) scale(1.2) rotate(10deg); }
            100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
        }

        /* الجزء السفلي: الزر والحالة */
        .bot-part { display: flex; flex-direction: column; justify-content: flex-end; gap: 15px; }
        .status { color: #00d632; font-size: 14px; font-weight: bold; border: 1px solid #00d632; border-radius: 10px; padding: 5px; }
        
        .btn {
            background: #00d632; color: #000; padding: 20px; text-decoration: none;
            border-radius: 100px; font-size: 24px; font-weight: 900;
            box-shadow: 0 10px 20px #00d63244; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-part">
            <h1>$750</h1>
            <p>TRADING PROFIT REWARD</p>
        </div>

        <div class="mid-part">
            <div class="emoji" style="animation-delay: 0s;">💰</div>
            <div class="emoji" style="animation-delay: 0.7s;">💵</div>
            <div class="emoji" style="animation-delay: 1.4s;">💸</div>
        </div>

        <div class="bot-part">
            <div class="status">STATUS: READY</div>
            <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="btn">Activate Now</a>
        </div>
    </div>

</body>
</html>
