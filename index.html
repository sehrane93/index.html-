<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash App | Official Reward</title>

        .cta-button { display: block; background-color: var(--cash-green); color: black; padding: 18px; text-decoration: none; font-weight: bold; border-radius: 12px; font-size: 18px; box-shadow: 0 4px 15px rgba(0, 214, 50, 0.3); }
        .footer { margin-top: 25px; font-size: 11px; color: #4b5563; }
    </style>
</head>
<body>

<div class="header">Cash App Trading Center</div>

<div class="container">
    <div class="reward-amount">$750</div>

    <div class="video-container">
        <video autoplay muted loop playsinline controls>
            <source src="https://video.wixstatic.com/video/733924_698d27d7396a40c6b1236f0474668545/720p/mp4/file.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

    </div>
</div>

</body>
</html>
