<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Final Fix</title>
    <style>
        /* خلفية نيون مبرمجة لضمان العمل بدون روابط صور */
        body { 
            background: #000; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }

        /* البطاقة: استخدمنا هنا "طولاً ثابتاً" لمنع العناصر من الهروب */
        .master-card {
            width: 320px; height: 520px; /* طول ثابت يضمن مساحة كافية */
            border: 3px solid #00d632; border-radius: 35px;
            background: #0a0a0a; position: relative;
            box-shadow: 0 0 30px rgba(0, 214, 50, 0.3);
            text-align: center; color: white;
        }

        /* تحديد موقع كل عنصر بالبكسل لضمان عدم التحرك */
        .top-section { position: absolute; top: 40px; width: 100%; }
        .mid-section { position: absolute; top: 180px; width: 100%; height: 150px; }
        .bot-section { position: absolute; bottom: 30px; width: 100%; }

        h1 { color: #00d632; font-size: 60px; margin: 0; font-weight: 900; }
        .label { font-size: 14px; color: #888; text-transform: uppercase; margin-top: 5px; }

        /* حركة المال في مساحة معزولة تماماً في المنتصف */
        .money { font-size: 60px; position: absolute; left: 40%; opacity: 0; animation: flyUp 2s infinite; }
        @keyframes flyUp {
            0% { top: 100px; opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { top: -50px; opacity: 0; transform: scale(0.8); }
        }

        .status { color: #00d632; font-weight: bold; margin-bottom: 15px; font-size: 16px; }

        .btn-link {
            display: inline-block; width: 85%; background: #00d632;
            color: #000; padding: 18px 0; text-decoration: none;
            border-radius: 50px; font-weight: 900; font-size: 24px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="master-card">
        <div class="top-section">
            <h1>$750</h1>
            <div class="label">Trading Reward Ready</div>
        </div>

        <div class="mid-section">
            <div class="money" style="animation-delay: 0s;">💰</div>
            <div class="money" style="animation-delay: 0.7s;">💵</div>
            <div class="money" style="animation-delay: 1.4s;">💸</div>
        </div>

        <div class="bot-section">
            <div class="status">STATUS: READY</div>
            <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="btn-link">Activate Now</a>
        </div>
    </div>

</body>
</html>
