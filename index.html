<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Profits</title>
    <style>
        /* شارت التداول في الخلفية */
        body { 
            background: #000 url('https://images.unsplash.com/photo-1611974714024-46279913560e?q=80&w=1000&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; font-family: 'Arial Black', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1;
        }

        .main-card { 
            position: relative; z-index: 2; width: 85%; max-width: 380px; 
            border: 3px solid #00d632; border-radius: 35px; 
            padding: 40px 20px; background: rgba(5, 5, 5, 0.95); 
            box-shadow: 0 0 50px rgba(0, 214, 50, 0.7); text-align: center;
        }

        h1 { color: #00d632; font-size: 70px; margin: 0; text-shadow: 0 0 20px rgba(0,214,50,0.8); }
        .sub { font-size: 16px; margin-bottom: 20px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

        /* الأموال المنفجرة والمتحركة للأعلى */
        .money-box { position: relative; height: 120px; margin: 20px 0; overflow: visible; }
        
        .floating-money {
            font-size: 50px; position: absolute; left: 50%; bottom: 0;
            transform: translateX(-50%);
            animation: explodeUp 2s infinite ease-out;
        }

        @keyframes explodeUp {
            0% { bottom: 0; opacity: 1; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-80%) scale(1.5) rotate(-20deg); }
            100% { bottom: 150px; opacity: 0; transform: translateX(20%) scale(0.8) rotate(20deg); }
        }

        .btn { 
            display: block; background: linear-gradient(135deg, #00d632, #00ff40); 
            color: #000; padding: 22px; text-decoration: none; 
            border-radius: 100px; font-weight: 900; font-size: 26px; 
            box-shadow: 0 15px 35px rgba(0, 214, 50, 0.5); transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.92); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="main-card">
        <h1>$750</h1>
        <div class="sub">Claim Your Trading Reward</div>
        
        <div class="money-box">
            <div class="floating-money" style="animation-delay: 0s;">💰</div>
            <div class="floating-money" style="animation-delay: 0.5s;">💵</div>
            <div class="floating-money" style="animation-delay: 1s;">💸</div>
        </div>

        <div style="color:#00d632; font-weight:bold; margin-bottom:20px;">STATUS: READY</div>

        <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="btn">ACTIVATE NOW</a>
    </div>
</body>
</html>
