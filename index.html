<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profit Boost</title>
    <style>
        /* خلفية شبكة تداول متحركة مبرمجة بالكود (لا تعتمد على روابط صور) */
        body { 
            margin: 0; padding: 0; height: 100vh;
            background-color: #050505;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 214, 50, .05) 25%, rgba(0, 214, 50, .05) 26%, transparent 27%, transparent 74%, rgba(0, 214, 50, .05) 75%, rgba(0, 214, 50, .05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 214, 50, .05) 25%, rgba(0, 214, 50, .05) 26%, transparent 27%, transparent 74%, rgba(0, 214, 50, .05) 75%, rgba(0, 214, 50, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Arial Black', sans-serif; overflow: hidden;
        }

        /* حاوية البطاقة بنظام الطبقات المنفصلة */
        .wrapper {
            position: relative; width: 90%; max-width: 350px; height: 500px;
            border: 4px solid #00d632; border-radius: 40px;
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 0 60px rgba(0, 214, 50, 0.3);
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-around; padding: 20px; box-sizing: border-box;
        }

        /* المبلغ في الأعلى تماماً */
        .amount { color: #00d632; font-size: 70px; margin: 0; text-shadow: 0 0 20px rgba(0,214,50,0.8); }
        .reward-text { color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-top: -10px; }

        /* منطقة آمنة للمال في المنتصف فقط */
        .money-stage { position: relative; width: 100%; height: 160px; overflow: visible; }
        
        .bill {
            font-size: 60px; position: absolute; left: 50%; bottom: 0;
            transform: translateX(-50%);
            animation: moveUp 1.5s infinite ease-out;
        }

        @keyframes moveUp {
            0% { bottom: 0; opacity: 1; transform: translateX(-50%) scale(0.8); }
            100% { bottom: 180px; opacity: 0; transform: translateX(-20%) scale(1.2) rotate(20deg); }
        }

        .status-box { color: #00d632; border: 1px solid #00d632; padding: 5px 20px; border-radius: 20px; font-size: 14px; }

        /* الزر في الأسفل تماماً */
        .btn-final {
            width: 100%; background: #00d632; color: #000;
            padding: 22px 0; text-decoration: none; border-radius: 100px;
            font-size: 26px; font-weight: 900; text-align: center;
            box-shadow: 0 10px 30px rgba(0, 214, 50, 0.4);
            text-transform: uppercase; transition: 0.2s;
        }

        .btn-final:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="wrapper">
        <div style="text-align: center;">
            <h1 class="amount">$750</h1>
            <div class="reward-text">Trading Profit Reward</div>
        </div>

        <div class="money-stage">
            <div class="bill" style="animation-delay: 0s;">💰</div>
            <div class="bill" style="animation-delay: 0.5s;">💵</div>
            <div class="bill" style="animation-delay: 1s;">💸</div>
        </div>

        <div class="status-box">STATUS: READY</div>

        <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="btn-final">Activate Now</a>
    </div>

</body>
</html>
