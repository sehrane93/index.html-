<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Profit $750</title>
    <style>
        /* خلفية شارت تداول حقيقية */
        body { 
            background: #000 url('https://w0.peakpx.com/wallpaper/559/541/HD-wallpaper-stock-market-candlestick-chart-trading-chart-stock-market-data-financial-charts-stock-market-concepts.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1;
        }

        /* حاوية البطاقة: تستخدم نظام Flex لترتيب العناصر عمودياً ومنع التداخل */
        .card { 
            position: relative; z-index: 2; width: 85%; max-width: 330px; 
            border: 2px solid #00d632; border-radius: 25px; 
            padding: 25px 15px; background: rgba(5, 5, 5, 0.98); 
            box-shadow: 0 0 30px rgba(0, 214, 50, 0.4); 
            display: flex; flex-direction: column; justify-content: space-between;
            height: 420px; text-align: center;
        }

        h1 { color: #00d632; font-size: 55px; margin: 0; font-weight: 900; }
        .reward-info { font-size: 14px; text-transform: uppercase; color: #ccc; }

        /* منطقة الأموال: معزولة في مساحة خاصة بها في المنتصف */
        .animation-area { position: relative; height: 130px; width: 100%; margin: 10px 0; overflow: visible; }
        
        .floating-bill {
            font-size: 50px; position: absolute; left: 50%; bottom: 0;
            transform: translateX(-50%);
            animation: burstEffect 2s infinite ease-out;
        }

        @keyframes burstEffect {
            0% { bottom: 0; opacity: 1; transform: translateX(-50%) scale(0.7); }
            50% { opacity: 1; transform: translateX(-80%) scale(1.3) rotate(-15deg); }
            100% { bottom: 160px; opacity: 0; transform: translateX(30%) scale(0.6) rotate(15deg); }
        }

        .ready-text { color: #00d632; font-weight: bold; margin-bottom: 10px; }

        /* الزر ثابت في أسفل البطاقة تماماً */
        .activate-link { 
            display: block; width: 100%; background: #00d632; 
            color: #000; padding: 18px 0; text-decoration: none; 
            border-radius: 50px; font-weight: 900; font-size: 22px; 
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(0, 214, 50, 0.3);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <div>
            <h1>$750</h1>
            <div class="reward-info">Trading Reward Available</div>
        </div>
        
        <div class="animation-area">
            <div class="floating-bill" style="animation-delay: 0s;">💰</div>
            <div class="floating-bill" style="animation-delay: 0.6s;">💵</div>
            <div class="floating-bill" style="animation-delay: 1.2s;">💸</div>
        </div>

        <div>
            <div class="ready-text">STATUS: READY</div>
            <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="activate-link">Activate Now</a>
        </div>
    </div>
</body>
</html>
