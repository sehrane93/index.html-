<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Profit $750</title>
    <style>
        /* خلفية شارت تداول حقيقية واحترافية */
        body { 
            background: #000 url('https://images.unsplash.com/photo-1611974714024-46279913560e?q=80&w=1000&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1;
        }

        .card { 
            position: relative; z-index: 2; width: 85%; max-width: 350px; 
            border: 2px solid #00d632; border-radius: 25px; 
            padding: 25px 15px; background: rgba(10, 10, 10, 0.95); 
            box-shadow: 0 0 40px rgba(0, 214, 50, 0.5); text-align: center;
        }

        h1 { color: #00d632; font-size: 55px; margin: 0; text-shadow: 0 0 15px rgba(0,214,50,0.6); }
        .sub-text { font-size: 14px; margin-bottom: 10px; text-transform: uppercase; color: #ccc; }

        /* منطقة الأموال المتحركة لمنع تداخل العناصر */
        .money-box { position: relative; height: 100px; margin: 15px 0; }
        
        .flying {
            font-size: 45px; position: absolute; left: 50%; bottom: 0;
            transform: translateX(-50%);
            animation: burst 2s infinite ease-out;
        }

        @keyframes burst {
            0% { bottom: 0; opacity: 1; transform: translateX(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateX(-70%) scale(1.2) rotate(-15deg); }
            100% { bottom: 130px; opacity: 0; transform: translateX(30%) scale(0.6) rotate(15deg); }
        }

        /* تحسين حجم الزر ليناسب الشاشة */
        .btn { 
            display: inline-block; width: 85%; background: linear-gradient(135deg, #00d632, #00ff40); 
            color: #000; padding: 15px 0; text-decoration: none; 
            border-radius: 50px; font-weight: 900; font-size: 22px; 
            box-shadow: 0 8px 20px rgba(0, 214, 50, 0.3); transition: 0.3s;
            text-transform: uppercase; margin-top: 10px;
        }

        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <h1>$750</h1>
        <div class="sub-text">Claim Your Trading Reward</div>
        
        <div class="money-box">
            <div class="flying" style="animation-delay: 0s;">💰</div>
            <div class="flying" style="animation-delay: 0.7s;">💵</div>
            <div class="flying" style="animation-delay: 1.4s;">💸</div>
        </div>

        <div style="color:#00d632; font-weight:bold; margin-bottom:15px; font-size: 16px;">
            STATUS: <span style="text-decoration: underline;">READY</span>
        </div>

        <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="btn">Activate Now</a>
    </div>
</body>
</html>
