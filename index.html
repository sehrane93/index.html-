<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cash App Reward Animation</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial Black', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .video-canvas {
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
            position: relative; overflow: hidden;
        }

        /* الطبقات النصية المتحركة */
        .slide {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; 
            opacity: 0; transform: scale(0.8);
            animation: playVideo 12s infinite;
        }

        /* توقيت المشاهد */
        .scene-1 { animation-delay: 0s; } /* Hook */
        .scene-2 { animation-delay: 4s; } /* Process */
        .scene-3 { animation-delay: 8s; } /* CTA */

        @keyframes playVideo {
            0% { opacity: 0; transform: scale(0.5); }
            5%, 30% { opacity: 1; transform: scale(1); }
            35%, 100% { opacity: 0; transform: scale(1.2); }
        }

        .highlight { color: #00d632; font-size: 80px; text-shadow: 0 0 30px #00d632; margin: 0; }
        .sub-text { font-size: 24px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .instruction { font-size: 35px; margin-top: 20px; line-height: 1.2; }

        /* أيقونة الإيميل */
        .email-box {
            width: 150px; height: 100px; border: 4px solid #00d632;
            border-radius: 10px; margin-bottom: 20px; position: relative;
            animation: flash 1s infinite;
        }

        @keyframes flash {
            0%, 100% { border-color: #00d632; box-shadow: 0 0 10px #00d632; }
            50% { border-color: #fff; box-shadow: 0 0 30px #fff; }
        }

        /* الرابط النهائي */
        .final-link {
            background: #00d632; color: #000; padding: 15px 30px;
            border-radius: 50px; font-size: 20px; margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0, 214, 50, 0.5);
        }

        /* أموال تتساقط في الخلفية */
        .rain { position: absolute; color: #00d632; font-size: 25px; opacity: 0.2; animation: fall 3s linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body>

    <div class="video-canvas">
        <div class="slide scene-1">
            <p class="sub-text">WAIT! LOOK AT THIS 💸</p>
            <h1 class="highlight">$750</h1>
            <p class="instruction">CASH APP REWARD<br>READY FOR YOU</p>
        </div>

        <div class="slide scene-2">
            <div class="email-box"></div>
            <p class="sub-text">EASY 2-STEP PROCESS</p>
            <h1 class="instruction" style="color:#00d632">1. ENTER EMAIL<br>2. CHECK BALANCE</h1>
            <p style="font-size: 18px;">NO SURVEYS. NO BS.</p>
        </div>

        <div class="slide scene-3">
            <h1 class="highlight">GO NOW!</h1>
            <p class="instruction">CLAIM YOUR $750 BELOW</p>
            <div class="final-link">LINK IN BIO: sebrane93.github.io</div>
            <p style="margin-top: 20px; font-size: 14px; color: #888;">*Available in USA 🇺🇸</p>
        </div>
    </div>

    <script>
        // إضافة بعض الأموال التي تتساقط لزيادة الحماس
        for (let i = 0; i < 20; i++) {
            let rain = document.createElement('div');
            rain.className = 'rain';
            rain.innerHTML = '$';
            rain.style.left = Math.random() * 100 + 'vw';
            rain.style.animationDuration = (Math.random() * 2 + 1) + 's';
            rain.style.top = '-5vh';
            document.querySelector('.video-canvas').appendChild(rain);
        }
    </script>
</body>
</html>
