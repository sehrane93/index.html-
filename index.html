<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Trading Reward</title>
    <style>
        /* خلفية شارت التداول - تم اختيار رابط قوي لضمان الظهور */
        body { 
            background: #000 url('https://w0.peakpx.com/wallpaper/559/541/HD-wallpaper-stock-market-candlestick-chart-trading-chart-stock-market-data-financial-charts-stock-market-concepts.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; font-family: 'Arial Black', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* طبقة حماية (Overlay) لجعل النصوص مشعة وواضحة فوق الشارت */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1;
        }

        .card { 
            position: relative; z-index: 2; width: 88%; max-width: 380px; 
            border: 3px solid #00d632; border-radius: 35px; 
            padding: 40px 20px; background: rgba(10, 10, 10, 0.95); 
            box-shadow: 0 0 50px rgba(0, 214, 50, 0.7); text-align: center;
        }

        h1 { color: #00d632; font-size: 70px; margin: 0; text-shadow: 0 0 20px rgba(0,214,50,0.8); }
        .sub-title { font-size: 16px; margin-bottom: 20px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

        /* منطقة الأموال المنفجرة - تتحرك للأعلى وتختفي */
        .explosion-container { position: relative; height: 150px; margin: 20px 0; overflow: visible; }
        
        .money-item {
            font-size: 55px; position: absolute; left: 50%; bottom: 0;
            transform: translateX(-50%);
            animation: burstUp 2s infinite ease-out;
        }

        @keyframes burstUp {
            0% { bottom: 0; opacity: 1; transform: translateX(-50%) scale(0.8) rotate(0deg); }
            50% { opacity: 1; transform: translateX(-80%) scale(1.4) rotate(-25deg); }
            100% { bottom: 180px; opacity: 0; transform: translateX(40%) scale(0.7) rotate(25deg); }
        }

        .cta-btn { 
            display: block; background: linear-gradient(135deg, #00d632, #00ff40); 
            color: #000; padding: 22px; text-decoration: none; 
            border-radius: 100px; font-weight: 900; font-size: 26px; 
            box-shadow: 0 15px 35px rgba(0, 214, 50, 0.5); transition: 0.3s;
            text-transform: uppercase; border: none; cursor: pointer;
        }

        .cta-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <h1>$750</h1>
        <div class="sub-title">Claim Your Trading Reward</div>
        
        <div class="explosion-container">
            <div class="money-item" style="animation-delay: 0s;">💰</div>
            <div class="money-item" style="animation-delay: 0.7s;">💵</div>
            <div class="money-item" style="animation-delay: 1.4s;">💸</div>
        </div>

        <div style="color:#00d632; font-weight:bold; margin-bottom:20px; font-size: 18px;">
            STATUS: <span style="text-decoration: underline;">READY</span>
        </div>

        <a href="https://smrturl.co/a/s87700d574f/663?s1=" class="cta-btn">Activate Now</a>
    </div>
</body>
</html>
